async function saveState(state) {
  await setDoc(doc(firestore, "state", "main"), state);
}
function subscribeState(cb) {
  return onSnapshot(doc(firestore, "state", "main"), (snap) => {
    if (snap.exists()) cb(snap.data());
    else cb(DEFAULT_STATE);
  });
}
async function initState() {
  const snap = await getDoc(doc(firestore, "state", "main"));
  if (!snap.exists()) await saveState(DEFAULT_STATE);
}

async function translateWithAI(itTitle, itBody) {
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1500,
        messages: [{ role: "user", content: `Translate this Italian text into English, French, Spanish, and European Portuguese. Return ONLY valid JSON, no markdown, no backticks:\n{"en":{"title":"...","body":"..."},"fr":{"title":"...","body":"..."},"es":{"title":"...","body":"..."},"pt":{"title":"...","body":"..."}}\n\nItalian title: ${itTitle}\nItalian body: ${itBody}` }]
      })
    });
    const data = await res.json();
    const raw = data.content?.[0]?.text || "{}";
    return JSON.parse(raw.replace(/```[a-z]*\n?/gi,"").replace(/```/g,"").trim());
  } catch(e) {
    return { en:{title:itTitle,body:itBody}, fr:{title:itTitle,body:itBody}, es:{title:itTitle,body:itBody}, pt:{title:itTitle,body:itBody} };
  }
}

function e(tag, attrs, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "style") Object.assign(el.style, v);
    else if (k === "class") el.className = v;
    else el.setAttribute(k, v);
  }
  for (const child of children.flat()) {
    if (child == null) continue;
    el.appendChild(typeof child === "string" ? document.createTextNode(child) : child);
  }
  return el;
}

// ═══ HELPERS ═══
function getActiveShares() {
  const mode = appState.displayMode || "one";
  const all = appState.shares || [];
  if (mode === "one") {
    const s = all.find(s => s.id === appState.activeShareId);
    return s ? [s] : [];
  } else if (mode === "selected") {
    const ids = appState.selectedShareIds || [];
    return all.filter(s => ids.includes(s.id));
  } else {
    return all;
  }
}

function renderShareCard(share, lang, section, ui) {
  const content = share.translations?.[lang]?.title ? share.translations[lang] : share.translations?.it;
  const parts = [
    section ? e("div", { style:{display:"inline-block", padding:"4px 14px", borderRadius:"20px", background:"rgba(200,169,110,0.12)", border:"1px solid rgba(200,169,110,0.25)", color:"#c8a96e", fontSize:"13px", marginBottom:"16px"} }, section.icon + " " + section.label) : null,
    e("h2", { style:{fontSize:"23px", fontWeight:"600", color:"#e8dcc8", marginBottom:"14px", lineHeight:"1.35"} }, content?.title || "—"),
    e("p", { style:{fontSize:"16px", lineHeight:"1.8", color:"#c8b89a", marginBottom:"16px", whiteSpace:"pre-wrap"} }, content?.body || ""),
  ];
  if (share.imageUrl) parts.push(e("img", { src:share.imageUrl, style:{width:"100%", borderRadius:"14px", marginBottom:"16px", maxHeight:"300px", objectFit:"cover"} }));
  parts.push(e("div", { style:{fontSize:"11px", color:"#706050", textAlign:"center", letterSpacing:"1px", marginTop:"16px"} }, ui.by));
  return e("div", {}, ...parts.filter(Boolean));
}

function renderCouple() {
  const ui = UI_LABELS[coupleLang || "it"];

  if (!coupleLang) {

        e("div", { style:{textAlign:"center", fontSize:"52px", marginBottom:"6px"} }, "💞"),
        e("h2", { style:{textAlign:"center", fontSize:"20px", color:"#c8a96e", fontWeight:"400", marginBottom:"28px", letterSpacing:"1px"} }, UI_LABELS.it.choose),
        grid
      )
    );
  }

  const backBtn = e("button", {
    style:{display:"inline-flex", alignItems:"center", gap:"6px", background:"transparent", border:"1px solid rgba(200,169,110,0.3)", color:"#c8a96e", borderRadius:"20px", padding:"4px 14px", cursor:"pointer", fontSize:"13px", marginBottom:"24px"},
    onClick: () => { coupleLang = null; couplePageIndex = 0; render(); }
  }, LANG_FLAGS[coupleLang] + " " + LANG_NAMES[coupleLang] + " ✕");

  let body;
  if (activeShares.length === 0) {
    body = e("div", { style:{textAlign:"center", padding:"20px 0"} },
      e("img", { src:LOGO_URL, style:{width:"100%", borderRadius:"12px", marginBottom:"24px", objectFit:"cover"} }),
      e("div", { style:{fontSize:"42px", marginBottom:"12px"} }, "💞"),
      e("p", { style:{color:"#c8a96e", fontSize:"19px", lineHeight:"1.7", fontStyle:"italic", marginBottom:"16px"} }, ui.welcome),
      e("p", { style:{color:"#a09080", fontSize:"13px", lineHeight:"1.6"} }, ui.waiting)
    );
  } else if (activeShares.length === 1) {
    const share = activeShares[0];
    const section = sections.find(s => s.id === share.sectionId);
    body = renderShareCard(share, coupleLang, section, ui);
  } else {
    const idx = Math.max(0, Math.min(couplePageIndex, activeShares.length - 1));
    const share = activeShares[idx];
    const section = sections.find(s => s.id === share.sectionId);
    const nav = e("div", { style:{display:"flex", alignItems:"center", justifyContent:"space-between", marginTop:"20px", gap:"10px"} },
      e("button", {
        style:{padding:"8px 16px", borderRadius:"20px", border:"1px solid rgba(200,169,110,0.3)", background:"transparent", color:idx===0?"#504040":"#c8a96e", cursor:idx===0?"default":"pointer", fontSize:"13px"},
        onClick: () => { if(idx>0){couplePageIndex=idx-1;render();} }
      }, ui.prev),
      e("span", { style:{color:"#706050", fontSize:"13px"} }, `${idx+1} ${ui.of} ${activeShares.length}`),
      e("button", {
        style:{padding:"8px 16px", borderRadius:"20px", border:"1px solid rgba(200,169,110,0.3)", background:"transparent", color:idx===activeShares.length-1?"#504040":"#c8a96e", cursor:idx===activeShares.length-1?"default":"pointer", fontSize:"13px"},
        onClick: () => { if(idx<activeShares.length-1){couplePageIndex=idx+1;render();} }
      }, ui.next)
    );
    body = e("div", {}, renderShareCard(share, coupleLang, section, ui), nav);
  }

  return e("div", { style:{minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:"24px", background:"radial-gradient(ellipse at 50% 0%, #1a0a2e 0%, #0d0d1a 70%)"} },
    e("div", { style:{width:"100%", maxWidth:"540px", background:"rgba(255,255,255,0.04)", borderRadius:"24px", border:"1px solid rgba(200,169,110,0.2)", padding:"40px 32px"} },
      backBtn, body
    )
  );
}

// ═══ SHARE FORM ═══
function renderShareForm(sections, isLibrary) {
  const inp = (placeholder, val, onChange) => {

    el.addEventListener("input", ev => onChange(ev.target.value));
    return el;
  };
  const ta = (placeholder, val, onChange) => {
    const el = e("textarea", { placeholder, rows:"3", style:{width:"100%", padding:"10px 14px", borderRadius:"8px", border:"1px solid rgba(200,169,110,0.25)", background:"rgba(255,255,255,0.04)", color:"#e8dcc8", fontSize:"14px", resize:"vertical", lineHeight:"1.6"} });
    el.value = val||"";
    el.addEventListener("input", ev => onChange(ev.target.value));
    return el;
  };

  const form = isLibrary ? libForm : adminForm;
  const editId = isLibrary ? libEditId : adminEditId;

  const sectionSel = !isLibrary ? (() => {
    const sel = e("select", { style:{width:"100%", padding:"10px 14px", borderRadius:"8px", border:"1px solid rgba(200,169,110,0.25)", background:"#1a1a2e", color:"#e8dcc8", fontSize:"15px"} },
      ...sections.map(sec => {
        const opt = e("option", { value:sec.id }, sec.icon+" "+sec.label);
        if (form.sectionId===sec.id) opt.selected=true;
        return opt;
      })
    );
    sel.addEventListener("change", ev => { form.sectionId=ev.target.value; });
    return sel;

    )

  const saveAction = isLibrary ? saveLibForm : saveForm;

  return e("div", { style:{maxWidth:"620px"} },
    e("h3", { style:{fontSize:"20px", color:"#c8a96e", marginBottom:"20px"} },
      editId ? "✏️ Modifica condivisione" : (isLibrary ? "📦 Nuova condivisione in Libreria" : "➕ Nuova condivisione")

    isLibrary ? e("div", { style:{display:"grid", gridTemplateColumns:"1fr 1fr", gap:"10px", marginBottom:"16px"} },

            e("div", { style:{fontSize:"11px", opacity:"0.7", marginTop:"2px"} }, desc)
          )
        )
      )
    );

    const activeShares = getActiveShares();
    let statusText = "";
    if (mode === "one") {
      const active = appState.shares?.find(s => s.id === appState.activeShareId);
      statusText = active ? `Attiva: "${active?.translations?.it?.title||""}"` : "Nessuna condivisione attiva — le coppie vedono la schermata di attesa";
    } else if (mode === "selected") {
      const n = (appState.selectedShareIds||[]).length;
      statusText = n > 0 ? `${n} condivisioni selezionate` : "Nessuna selezionata — le coppie vedono la schermata di attesa";
    } else {
      statusText = `Tutte visibili (${appState.shares?.length||0}) — le coppie possono scorrere`;
    }

    const statusBar = e("div", { style:{display:"flex", alignItems:"center", gap:"10px", padding:"10px 16px", borderRadius:"10px", background:"rgba(200,169,110,0.06)", marginBottom:"20px", fontSize:"14px", color:"#a09080"} },
      e("span", { style:{width:"10px", height:"10px", borderRadius:"50%", flexShrink:"0", background:activeShares.length>0?"#4caf50":"#555", boxShadow:activeShares.length>0?"0 0 6px #4caf50":"none", display:"inline-block"} }),
      statusText
    );

    const filters = e("div", { style:{display:"flex", gap:"8px", marginBottom:"18px", flexWrap:"wrap"} },
      e("button", { style:{padding:"4px 14px", borderRadius:"20px", border:`1px solid ${filterSection==="all"?"#c8a96e":"rgba(200,169,110,0.2)"}`, background:filterSection==="all"?"rgba(200,169,110,0.15)":"transparent", color:filterSection==="all"?"#c8a96e":"#a09080", cursor:"pointer", fontSize:"12px"}, onClick:()=>{filterSection="all";render();} }, "Tutte"),
      ...sections.map(sec => e("button", {
        style:{padding:"4px 14px", borderRadius:"20px", border:`1px solid ${filterSection===sec.id?"#c8a96e":"rgba(200,169,110,0.2)"}`, background:filterSection===sec.id?"rgba(200,169,110,0.15)":"transparent", color:filterSection===sec.id?"#c8a96e":"#a09080", cursor:"pointer", fontSize:"12px"},
        onClick:()=>{filterSection=sec.id;render();}
      }, sec.icon+" "+sec.label))
    );

    const grouped = sections
      .filter(sec => filterSection==="all" || sec.id===filterSection)
      .map(sec => {
        const shares = (appState.shares||[]).filter(s=>s.sectionId===sec.id);
        const secHeader = e("div", { style:{display:"flex", alignItems:"center", justifyContent:"space-between", fontSize:"15px", color:"#c8a96e", fontWeight:"600", marginBottom:"8px", paddingBottom:"6px", borderBottom:"1px solid rgba(200,169,110,0.15)"} },
          e("span", {}, sec.icon+" "+sec.label),
          e("span", { style:{fontSize:"12px", color:"#706050", fontWeight:"400"} }, `(${shares.length})`),
          e("button", { style:{padding:"3px 12px", borderRadius:"16px", border:"1px solid rgba(200,169,110,0.4)", background:"rgba(200,169,110,0.1)", color:"#c8a96e", cursor:"pointer", fontSize:"13px", fontWeight:"600"}, onClick:()=>openNewForm(sec.id) }, "➕ Aggiungi")
        );

        const shareRows = shares.length===0
          ? [e("div", { style:{color:"#504040", fontSize:"13px", padding:"6px 0"} }, "Nessuna condivisione in questa sezione")]
          : shares.map((share, idx) => {
            const isActiveOne = share.id === appState.activeShareId;
            const isSelected = (appState.selectedShareIds||[]).includes(share.id);
            const isHighlighted = mode==="one" ? isActiveOne : mode==="selected" ? isSelected : true;

            let actionBtn;
            if (mode === "one") {
              actionBtn = e("button", {
                style:{padding:"5px 14px", borderRadius:"16px", border:`1px solid ${isActiveOne?"#4caf50":"rgba(200,169,110,0.4)"}`, background:isActiveOne?"rgba(76,175,80,0.2)":"transparent", color:isActiveOne?"#4caf50":"#c8a96e", cursor:"pointer", fontSize:"12px", fontWeight:"600"},
                onClick:()=>activateShare(share.id)
              }, isActiveOne?"● ATTIVA":"Attiva");
            } else if (mode === "selected") {
              actionBtn = e("button", {
                style:{padding:"5px 14px", borderRadius:"16px", border:`1px solid ${isSelected?"#4caf50":"rgba(200,169,110,0.4)"}`, background:isSelected?"rgba(76,175,80,0.2)":"transparent", color:isSelected?"#4caf50":"#c8a96e", cursor:"pointer", fontSize:"12px", fontWeight:"600"},
                onClick:()=>toggleSelected(share.id)
              }, isSelected?"✓ Selezionata":"Seleziona");
            } else {
              actionBtn = e("span", { style:{fontSize:"12px", color:"#4caf50", padding:"5px 8px"} }, "✓ Visibile");
            }

            // Order buttons
            const orderBtns = e("div", { style:{display:"flex", flexDirection:"column", gap:"2px"} },
              e("button", { style:{background:"transparent", border:"none", cursor:idx===0?"default":"pointer", fontSize:"14px", color:idx===0?"#504040":"#a09080", lineHeight:"1"}, onClick:()=>moveShare(sec.id, idx, -1) }, "▲"),
              e("button", { style:{background:"transparent", border:"none", cursor:idx===shares.length-1?"default":"pointer", fontSize:"14px", color:idx===shares.length-1?"#504040":"#a09080", lineHeight:"1"}, onClick:()=>moveShare(sec.id, idx, 1) }, "▼")
            );

            return e("div", { style:{display:"flex", alignItems:"center", gap:"10px", padding:"10px 14px", borderRadius:"10px", border:`1px solid ${isHighlighted?"rgba(76,175,80,0.5)":"rgba(200,169,110,0.1)"}`, marginBottom:"6px", background:isHighlighted?"rgba(76,175,80,0.05)":"rgba(255,255,255,0.02)"} },
              orderBtns,
              e("div", { style:{flex:"1"} },
                e("strong", { style:{color:"#e8dcc8"} }, share.translations?.it?.title||"—"),
                e("div", { style:{fontSize:"12px", color:"#706050", marginTop:"2px"} },
                  (share.coupleName ? "👫 "+share.coupleName+" · " : "") +
                  (share.day ? "📅 "+share.day+" " : "") +
                  (share.time ? "🕐 "+share.time+" " : "") +
                  Object.keys(LANG_FLAGS).filter(l=>share.translations?.[l]?.title).map(l=>LANG_FLAGS[l]).join(" ")
                )
              ),
              e("div", { style:{display:"flex", gap:"6px", alignItems:"center"} },
                e("button", { style:{background:"transparent", border:"none", cursor:"pointer", fontSize:"16px", color:"#a09080"}, onClick:()=>openEditForm(share) }, "✏️"),
                e("button", { style:{background:"transparent", border:"none", cursor:"pointer", fontSize:"16px", color:"#a09080"}, onClick:()=>deleteShare(share.id) }, "🗑️"),
                actionBtn
              )
            );
          });
        return e("div", { style:{marginBottom:"28px"} }, secHeader, ...shareRows);
      });

    bodyContent = e("div", {}, modeBar, statusBar, filters, ...grouped);
  }

  // ── TAB: NUOVA (form) ──
  else if (adminTab === "add" && adminForm) {
    bodyContent = renderShareForm(sections, false);
  }

  // ── TAB: LIBRERIA ──
  else if (adminTab === "library") {
    if (libForm) {
      bodyContent = renderShareForm(sections, true);
    } else {
      const library = appState.library || [];
      const communities = ["all", ...new Set(library.map(l=>l.community).filter(Boolean))];

      const comFilters = e("div", { style:{display:"flex", gap:"8px", marginBottom:"18px", flexWrap:"wrap"} },
        ...communities.map(c => e("button", {
          style:{padding:"4px 14px", borderRadius:"20px", border:`1px solid ${libFilterCommunity===c?"#c8a96e":"rgba(200,169,110,0.2)"}`, background:libFilterCommunity===c?"rgba(200,169,110,0.15)":"transparent", color:libFilterCommunity===c?"#c8a96e":"#a09080", cursor:"pointer", fontSize:"12px"},
          onClick:()=>{libFilterCommunity=c;render();}
        }, c==="all"?"🌍 Tutte":c))
      );

      const filtered = library.filter(l => libFilterCommunity==="all" || l.community===libFilterCommunity);

      const libRows = filtered.length === 0
        ? [e("div", { style:{color:"#504040", fontSize:"14px", padding:"20px 0", textAlign:"center"} }, "Nessuna condivisione in libreria. Aggiungine una con il bottone qui sotto.")]
        : filtered.map((item, idx) => {
          const usedInShares = (appState.shares||[]).some(s=>s.libId===item.id);
          return e("div", { style:{display:"flex", alignItems:"center", gap:"12px", padding:"12px 14px", borderRadius:"10px", border:"1px solid rgba(200,169,110,0.15)", marginBottom:"8px", background:"rgba(255,255,255,0.02)"} },
            e("div", { style:{flex:"1"} },
              e("div", { style:{display:"flex", alignItems:"center", gap:"8px", flexWrap:"wrap", marginBottom:"4px"} },
                e("strong", { style:{color:"#e8dcc8", fontSize:"15px"} }, item.translations?.it?.title||"—"),
                item.coupleName ? e("span", { style:{fontSize:"12px", color:"#c8a96e", background:"rgba(200,169,110,0.1)", padding:"2px 8px", borderRadius:"10px"} }, "👫 "+item.coupleName) : null,
              ),
              e("div", { style:{fontSize:"12px", color:"#706050", marginTop:"2px"} },
                (item.community ? "🌍 "+item.community : "") +
                (item.day ? " · 📅 "+item.day : "") +
                (item.time ? " · 🕐 "+item.time : "") +
                " · " + Object.keys(LANG_FLAGS).filter(l=>item.translations?.[l]?.title).map(l=>LANG_FLAGS[l]).join(" ")
              )
            ),
            e("div", { style:{display:"flex", gap:"6px", alignItems:"center", flexWrap:"wrap"} },
              e("button", { style:{background:"transparent", border:"none", cursor:"pointer", fontSize:"16px", color:"#a09080"}, onClick:()=>openLibEditForm(item) }, "✏️"),
              e("button", { style:{background:"transparent", border:"none", cursor:"pointer", fontSize:"16px", color:"#a09080"}, onClick:()=>deleteLibItem(item.id) }, "🗑️"),
              e("button", {
                style:{padding:"5px 12px", borderRadius:"16px", border:"1px solid rgba(100,200,100,0.4)", background:"rgba(100,200,100,0.08)", color:"#90d090", cursor:"pointer", fontSize:"12px", fontWeight:"600"},
                onClick:()=>useFromLibrary(item)
              }, "📋 Usa nel programma")
            )
          );
        });

      bodyContent = e("div", { style:{maxWidth:"820px"} },
        e("div", { style:{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"16px", flexWrap:"wrap", gap:"10px"} },
          e("div", {},
            e("h3", { style:{fontSize:"20px", color:"#c8a96e"} }, "📦 Libreria condivisioni"),
            e("p", { style:{fontSize:"13px", color:"#a09080", marginTop:"4px"} }, `${library.length} condivisioni archiviate — invisibili alle coppie`)
          ),
          e("button", { style:{padding:"8px 20px", borderRadius:"20px", border:"none", background:"linear-gradient(135deg, #c8a96e, #e8c87a)", color:"#0d0d1a", fontWeight:"700", cursor:"pointer", fontSize:"14px"}, onClick:openNewLibForm }, "➕ Aggiungi alla libreria")
        ),
        comFilters,
        ...libRows
      );
    }
  }

  // ── TAB: SEZIONI ──
  else if (adminTab === "sections") {
    const secRows = sections.map(sec =>
      e("div", { style:{display:"flex", alignItems:"center", gap:"12px", padding:"10px 14px", borderRadius:"10px", border:"1px solid rgba(200,169,110,0.15)", marginBottom:"8px", background:"rgba(255,255,255,0.02)"} },
        e("span", { style:{fontSize:"22px"} }, sec.icon),
        e("span", { style:{flex:"1", color:"#e8dcc8"} }, sec.label),
        e("span", { style:{fontSize:"12px", color:"#706050"} }, (appState.shares||[]).filter(s=>s.sectionId===sec.id).length+" condivisioni"),
        e("button", { style:{background:"transparent", border:"none", cursor:"pointer", fontSize:"16px", color:"#a09080"}, onClick:()=>deleteSection(sec.id) }, "🗑️")
      )
    );
    const iconInput = e("input", { placeholder:"Emoji", style:{width:"70px", padding:"10px 14px", borderRadius:"8px", border:"1px solid rgba(200,169,110,0.25)", background:"rgba(255,255,255,0.04)", color:"#e8dcc8", fontSize:"15px"} });
    iconInput.value = newSecIcon;
    iconInput.addEventListener("input", ev=>{ newSecIcon=ev.target.value; });
    const labelInput = e("input", { placeholder:"Nome sezione", style:{flex:"1", padding:"10px 14px", borderRadius:"8px", border:"1px solid rgba(200,169,110,0.25)", background:"rgba(255,255,255,0.04)", color:"#e8dcc8", fontSize:"15px"} });
    labelInput.value = newSecLabel;
    labelInput.addEventListener("input", ev=>{ newSecLabel=ev.target.value; });
    labelInput.addEventListener("keydown", ev=>ev.key==="Enter"&&addSection());
    bodyContent = e("div", { style:{maxWidth:"560px"} },
      e("h3", { style:{fontSize:"20px", color:"#c8a96e", marginBottom:"6px"} }, "🗂️ Sezioni del weekend"),
      e("p", { style:{color:"#a09080", fontSize:"14px", marginBottom:"20px"} }, "Aggiungi, rinomina o elimina le sezioni."),
      ...secRows,
      e("div", { style:{marginTop:"24px", padding:"16px", borderRadius:"12px", border:"1px solid rgba(200,169,110,0.2)", background:"rgba(200,169,110,0.04)"} },
        e("div", { style:{fontSize:"14px", color:"#c8a96e", marginBottom:"12px"} }, "➕ Aggiungi nuova sezione"),
        e("div", { style:{display:"flex", gap:"10px", flexWrap:"wrap"} },
          iconInput, labelInput,
          e("button", { style:{padding:"10px 20px", borderRadius:"20px", border:"none", background:"linear-gradient(135deg, #c8a96e, #e8c87a)", color:"#0d0d1a", fontWeight:"700", cursor:"pointer"}, onClick:addSection }, "Aggiungi")
        )
      )
    );
  }

  // ── TAB: QR ──
  else if (adminTab === "qr") {
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(coupleUrl)}&bgcolor=0d0d1a&color=c8a96e&margin=12`;
    bodyContent = e("div", { style:{textAlign:"center", padding:"20px 0"} },
      e("h3", { style:{fontSize:"20px", color:"#c8a96e", marginBottom:"12px"} }, "📲 QR Code per le coppie"),
      e("p", { style:{color:"#a09080", lineHeight:"1.7", marginBottom:"28px", fontSize:"15px"} }, "Le coppie scansionano questo QR con il cellulare."),
      e("div", { style:{display:"flex", justifyContent:"center", marginBottom:"16px"} },
        e("img", { src:qrUrl, style:{width:"200px", height:"200px", borderRadius:"14px", border:"2px solid rgba(200,169,110,0.35)"} })
      ),
      e("p", { style:{fontSize:"12px", color:"#706050", wordBreak:"break-all", marginBottom:"20px"} }, coupleUrl),
      e("div", { style:{display:"inline-block", padding:"12px 20px", borderRadius:"12px", background:"rgba(200,169,110,0.08)", border:"1px solid rgba(200,169,110,0.2)", fontSize:"14px", color:"#c8a96e", maxWidth:"460px"} },
        "💡 Proietta questo schermo oppure stampa il QR."
      )
    );
  }

  return e("div", { style:{minHeight:"100vh", display:"flex", flexDirection:"column"} },
    header,
    e("div", { style:{flex:"1", padding:"20px", maxWidth:"820px", width:"100%", margin:"0 auto"} }, bodyContent||e("div",{}))
  );
}

// ═══ ACTIONS ═══
async function activateShare(id) {
  await saveState({ ...appState, activeShareId: appState.activeShareId===id ? null : id });
}
async function toggleSelected(id) {
  const current = appState.selectedShareIds || [];
  const newIds = current.includes(id) ? current.filter(x=>x!==id) : [...current, id];
  await saveState({ ...appState, selectedShareIds: newIds });
}
async function deleteShare(id) {
  await saveState({
    ...appState,
    shares:(appState.shares||[]).filter(s=>s.id!==id),
    activeShareId:appState.activeShareId===id?null:appState.activeShareId,
    selectedShareIds:(appState.selectedShareIds||[]).filter(x=>x!==id)
  });
}
async function moveShare(sectionId, idx, dir) {
  let shares = [...(appState.shares||[])];
  const secShares = shares.filter(s=>s.sectionId===sectionId);
  const otherShares = shares.filter(s=>s.sectionId!==sectionId);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= secShares.length) return;
  [secShares[idx], secShares[newIdx]] = [secShares[newIdx], secShares[idx]];
  await saveState({ ...appState, shares: [...otherShares, ...secShares] });
}
function openNewForm(sectionId) {
  adminForm = {
    sectionId: sectionId || (appState.sections||[])[0]?.id || "ven-sera",
    imageUrl: "",
    coupleName: "",
    day: "",
    time: "",
    translations: Object.fromEntries(Object.keys(LANG_NAMES).map(l=>[l,{title:"",body:""}]))
  };
  adminEditId = null;
  adminTab = "add";
  render();
}
function openEditForm(share) {
  adminForm = {
    sectionId: share.sectionId || (appState.sections||[])[0]?.id || "",
    imageUrl: share.imageUrl||"",
    coupleName: share.coupleName||"",
    day: share.day||"",
    time: share.time||"",
    translations: { ...Object.fromEntries(Object.keys(LANG_NAMES).map(l=>[l,{title:"",body:""}])), ...share.translations }
  };
  adminEditId = share.id;
  adminTab = "add";
  render();
}
async function saveForm() {
  if (!adminForm) return;
  let shares = [...(appState.shares||[])];
  if (adminEditId) {
    shares = shares.map(s => s.id===adminEditId ? {...s,...adminForm,id:adminEditId} : s);
  } else {
    shares.push({ ...adminForm, id:"s"+Date.now() });
  }
  await saveState({ ...appState, shares });
  adminTab="list"; adminForm=null; adminEditId=null; render();
}

// Library actions
function openNewLibForm() {
  libForm = {
    coupleName: "",
    community: "",
    day: "",
    time: "",
    imageUrl: "",
    translations: Object.fromEntries(Object.keys(LANG_NAMES).map(l=>[l,{title:"",body:""}]))
  };
  libEditId = null;
  render();
}
function openLibEditForm(item) {
  libForm = {
    coupleName: item.coupleName||"",
    community: item.community||"",
    day: item.day||"",
    time: item.time||"",
    imageUrl: item.imageUrl||"",
    translations: { ...Object.fromEntries(Object.keys(LANG_NAMES).map(l=>[l,{title:"",body:""}])), ...item.translations }
  };
  libEditId = item.id;
  render();
}
async function saveLibForm() {
  if (!libForm) return;
  let library = [...(appState.library||[])];
  if (libEditId) {
    library = library.map(l => l.id===libEditId ? {...l,...libForm,id:libEditId} : l);
  } else {
    library.push({ ...libForm, id:"lib"+Date.now() });
  }
  await saveState({ ...appState, library });
  libForm=null; libEditId=null; render();
}
async function deleteLibItem(id) {
  await saveState({ ...appState, library:(appState.library||[]).filter(l=>l.id!==id) });
}
async function useFromLibrary(item) {
  // Open a section picker
  const sections = [...(appState.sections||[])].sort((a,b)=>a.order-b.order);
  const sectionId = sections[0]?.id;
  // Add to shares with a copy from library
  const newShare = {
    ...item,
    id: "s"+Date.now(),
    libId: item.id,
    sectionId: sectionId,
  };
  let shares = [...(appState.shares||[]), newShare];
  await saveState({ ...appState, shares });
  // Go to list tab so user can see it and move to right section
  adminTab = "list";
  render();
  alert(`"${item.translations?.it?.title||item.coupleName||"Condivisione"}" aggiunta a "${sections[0]?.label||"Venerdì sera"}".\nUsa la matita ✏️ per cambiarle sezione se necessario.`);
}

async function addSection() {
  if (!newSecLabel.trim()) return;
  const newSec = { id:"sec-"+Date.now(), label:newSecLabel.trim(), icon:newSecIcon||"📌", order:(appState.sections?.length||0)+1 };
  await saveState({ ...appState, sections:[...(appState.sections||[]), newSec] });
  newSecLabel=""; newSecIcon="✨"; render();
}
async function deleteSection(id) {
  await saveState({ ...appState, sections:(appState.sections||[]).filter(s=>s.id!==id) });
}

// ═══ RENDER ═══
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  const demoBar = e("div", { style:{display:"flex", alignItems:"center", gap:"8px", padding:"8px 16px", background:"rgba(200,169,110,0.06)", borderBottom:"1px solid rgba(200,169,110,0.12)", fontSize:"13px"} },
    e("span", { style:{color:"#c8a96e", marginRight:"4px"} }, "Vista:"),
    e("button", {
      style:{padding:"4px 14px", borderRadius:"20px", border:`1px solid ${currentView==="admin"?"#c8a96e":"rgba(200,169,110,0.3)"}`, background:currentView==="admin"?"rgba(200,169,110,0.2)":"transparent", color:"#c8a96e", cursor:"pointer", fontSize:"13px"},
      onClick:()=>{window.location.hash="";currentView="admin";render();}
    }, "🔐 Admin"),
    e("button", {
      style:{padding:"4px 14px", borderRadius:"20px", border:`1px solid ${currentView==="couple"?"#c8a96e":"rgba(200,169,110,0.3)"}`, background:currentView==="couple"?"rgba(200,169,110,0.2)":"transparent", color:"#c8a96e", cursor:"pointer", fontSize:"13px"},
      onClick:()=>{window.location.hash="couple";currentView="couple";render();}
    }, "💞 Vista Coppie")
  );
  app.appendChild(demoBar);
  app.appendChild(currentView==="couple" ? renderCouple() : renderAdmin());
}

await initState();
subscribeState(state => { appState = {...DEFAULT_STATE, ...state}; render(); });
</script>
</body>
</html>
